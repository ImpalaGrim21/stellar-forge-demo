<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#060a14" />
    <meta name="description" content="Build a galactic industrial empire — from a single mining drone to a galaxy-spanning Dyson swarm. An idle climb that runs instantly in your browser." />
    <title>Stellar Forge</title>

    <!-- PWA: installable + instant/offline repeat launches (§H.1.3). Absolute paths are base-rebased
         by Vite (like the module script below), so they resolve under '/' and '/stellar-forge-demo/'. -->
    <link rel="manifest" href="/stellar-forge-demo/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="32x32" href="/stellar-forge-demo/favicon-32.png" />
    <link rel="apple-touch-icon" href="/stellar-forge-demo/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Stellar Forge" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!--
      Layer contract per ADR-0009 / ADR-0012a:
      #game-root hosts the Three.js world canvas (world + Forge, z-bottom, opaque);
      #hud-overlay is the SIBLING vanilla-DOM HUD chrome (z-top,
      pointer-events: none on the container — interactive elements opt back in).
      The composition root (demo/main.ts) constructs and wires both (ADR-0006).
    -->
    <script type="module" crossorigin src="/stellar-forge-demo/assets/index-BzshT5Nh.js"></script>
    <link rel="modulepreload" crossorigin href="/stellar-forge-demo/assets/three-DWrLy3kp.js">
    <link rel="stylesheet" crossorigin href="/stellar-forge-demo/assets/index-CRNxe_9m.css">
  </head>
  <body>
    <div id="game-root"></div>
    <div id="hud-overlay" aria-live="off"></div>
  </body>
</html>
